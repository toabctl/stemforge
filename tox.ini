[tox]
requires = tox-uv>=1.0.0
envlist = lint, pytest
isolated_build = true

[testenv:lint]
basepython = python3.11
skip_install = true
deps =
    flake8
    flake8-pyproject
    black
commands =
    black --check src/stemforge tests
    flake8 src/stemforge tests

[testenv:pytest]
basepython = python3.11
deps =
    pytest
    pytest-mock
commands = pytest {posargs}
